
<!DOCTYPE html>
<html>
<head>
<title>Cyber Terminal Encoder</title>

<style>

body{
margin:0;
background:black;
font-family:monospace;
color:#00ff00;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:30px 10px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:95%;
max-width:700px;
background:rgba(0,0,0,0.85);
border:1px solid #00ff00;
box-shadow:0 0 25px #00ff00;
padding:25px;
box-sizing:border-box;
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
padding:10px;
font-family:monospace;
resize:none;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:10px 20px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
cursor:pointer;
font-family:monospace;
}

button:hover{
background:#00ff00;
color:black;
}

.output{
margin-top:20px;
padding:15px;
border:1px solid #00ff00;
min-height:60px;
word-wrap:break-word;
}

.history{
margin-top:25px;
border:1px solid #00ff00;
padding:10px;
max-height:150px;
overflow-y:auto;
font-size:14px;
word-wrap:break-word;
}

.historyTitle{
margin-bottom:5px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>CYBER TERMINAL ENCODER</h1>

<textarea id="input" placeholder="Enter text..."></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>

<div class="output" id="output"></div>

<div class="history">
<div class="historyTitle">History:</div>
<div id="historyList"></div>
</div>

<button id="adminBtn" onclick="showVisitors()" style="display:none;">
View Visitors
</button>

<div class="history" id="visitorBox" style="display:none;">
<div class="historyTitle">Visitors:</div>
<div id="visitorList"></div>
</div>

</div>

<script>

/* ask name */

let name = prompt("Enter your name:")

if(name){

let visitors = JSON.parse(localStorage.getItem("visitors") || "[]")

visitors.push(name)

localStorage.setItem("visitors", JSON.stringify(visitors))

}

if(name === "dev=1"){
document.getElementById("adminBtn").style.display="block"
}

/* show visitor list */

function showVisitors(){

let visitors = JSON.parse(localStorage.getItem("visitors") || "[]")

let list = document.getElementById("visitorList")

list.innerHTML=""

visitors.forEach(v=>{
let item=document.createElement("div")
item.innerText=v
list.appendChild(item)
})

document.getElementById("visitorBox").style.display="block"

}

/* typing animation */

function typeOutput(text){

let output=document.getElementById("output")
output.innerHTML=""

let i=0

function typing(){

if(i<text.length){
output.innerHTML+=text.charAt(i)
i++
setTimeout(typing,20)
}

}

typing()

}

/* history */

function addHistory(action,input,result){

let history=document.getElementById("historyList")

let item=document.createElement("div")

item.innerText=action+": "+input+" → "+result

history.prepend(item)

}

/* encode */

function encode(){

let text=document.getElementById("input").value

let encoded=btoa(text)

typeOutput(encoded)

addHistory("ENCODE",text,encoded)

}

/* decode */

function decode(){

let text=document.getElementById("input").value

try{

let decoded=atob(text)

typeOutput(decoded)

addHistory("DECODE",text,decoded)

}
catch{

typeOutput("Invalid encoded text")

}

}

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01"
letters=letters.split("")

let fontSize=14
let columns=canvas.width/fontSize
let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff00"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

</script>

</body>
</html>
