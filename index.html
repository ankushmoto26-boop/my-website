```html
<!DOCTYPE html>
<html>
<head>
<title>Power Web Tools</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:black;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

header{
padding:40px;
font-size:40px;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.tool{
background:rgba(0,0,0,0.7);
border:1px solid #00ffcc;
border-radius:10px;
width:260px;
padding:20px;
margin:20px;
box-shadow:0 0 10px #00ffcc;
transition:0.3s;
}

.tool:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00ffcc;
}

button{
background:#00ffcc;
border:none;
padding:10px 20px;
font-size:14px;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

textarea,input{
width:90%;
padding:8px;
margin-top:10px;
border-radius:5px;
border:none;
}

footer{
margin-top:60px;
opacity:0.7;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<header>⚡ Power Web Tools</header>

<div class="container">

<div class="tool">
<h3>Password Generator</h3>
<button onclick="generatePass()">Generate</button>
<p id="password"></p>
</div>

<div class="tool">
<h3>Random Number</h3>
<button onclick="randomNumber()">Generate</button>
<p id="number"></p>
</div>

<div class="tool">
<h3>Calculator</h3>
<input id="calc" placeholder="Example: 5+5">
<button onclick="calculate()">Calculate</button>
<p id="calcResult"></p>
</div>

<div class="tool">
<h3>Save Notes</h3>
<textarea id="notes"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

<div class="tool">
<h3>Text Counter</h3>
<textarea id="text"></textarea>
<button onclick="countText()">Count</button>
<p id="count"></p>
</div>

<div class="tool">
<h3>Base64 Encoder</h3>
<textarea id="encodeText"></textarea>
<button onclick="encode()">Encode</button>
<p id="encoded"></p>
</div>

<div class="tool">
<h3>Base64 Decoder</h3>
<textarea id="decodeText"></textarea>
<button onclick="decode()">Decode</button>
<p id="decoded"></p>
</div>

<div class="tool">
<h3>AI Chatbot</h3>
<input id="chatInput" placeholder="Ask something...">
<button onclick="chat()">Send</button>
<p id="chatReply"></p>
</div>

<div class="tool">
<h3>Text Summarizer</h3>
<textarea id="summaryText"></textarea>
<button onclick="summarize()">Summarize</button>
<p id="summaryResult"></p>
</div>

</div>

<footer>
Made by Ankush 🚀
</footer>

<script>

/* Password */
function generatePass(){
let chars="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#"
let pass=""
for(let i=0;i<12;i++){
pass+=chars[Math.floor(Math.random()*chars.length)]
}
document.getElementById("password").innerText=pass
}

/* Random */
function randomNumber(){
document.getElementById("number").innerText=Math.floor(Math.random()*1000)
}

/* Calculator */
function calculate(){
let val=document.getElementById("calc").value
try{
document.getElementById("calcResult").innerText=eval(val)
}catch{
document.getElementById("calcResult").innerText="Error"
}
}

/* Notes */
function saveNotes(){
let note=document.getElementById("notes").value
localStorage.setItem("notes",note)
alert("Saved!")
}

window.onload=function(){
document.getElementById("notes").value=localStorage.getItem("notes")||""
}

/* Counter */
function countText(){
let t=document.getElementById("text").value
document.getElementById("count").innerText="Characters: "+t.length
}

/* Base64 */
function encode(){
let t=document.getElementById("encodeText").value
document.getElementById("encoded").innerText=btoa(t)
}

function decode(){
let t=document.getElementById("decodeText").value
try{
document.getElementById("decoded").innerText=atob(t)
}catch{
document.getElementById("decoded").innerText="Invalid Base64"
}
}

/* Chatbot */
function chat(){
let input=document.getElementById("chatInput").value.toLowerCase()
let reply="I'm not sure about that."

if(input.includes("hello")||input.includes("hi")){
reply="Hello! Welcome to Power Web Tools."
}
else if(input.includes("your name")){
reply="I am the assistant of this website."
}
else if(input.includes("who made you")){
reply="This website was created by Ankush."
}
else if(input.includes("help")){
reply="Try the tools on this page!"
}

document.getElementById("chatReply").innerText=reply
}

/* Summarizer */
function summarize(){
let text=document.getElementById("summaryText").value
let sentences=text.split(".")
let result=sentences.slice(0,2).join(".")
document.getElementById("summaryResult").innerText=result
}

/* Matrix Background */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01"
letters=letters.split("")

let fontSize=14
let columns=canvas.width/fontSize

let drops=[]
for(let x=0;x<columns;x++)
drops[x]=1

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0F0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++
}
}

setInterval(draw,33)

</script>

</body>
</html>
```
