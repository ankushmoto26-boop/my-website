
<!DOCTYPE html>
<html>
<head>
<title>Cyber Encoder</title>

<style>

body{
margin:0;
background:black;
font-family:monospace;
color:#00ff00;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:600px;
margin:auto;
margin-top:80px;
background:rgba(0,0,0,0.8);
padding:30px;
border:1px solid #00ff00;
box-shadow:0 0 20px #00ff00;
text-align:center;
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
padding:10px;
font-family:monospace;
resize:none;
}

button{
margin-top:15px;
padding:10px 20px;
background:black;
border:1px solid #00ff00;
color:#00ff00;
cursor:pointer;
font-family:monospace;
}

button:hover{
background:#00ff00;
color:black;
}

.output{
margin-top:20px;
padding:15px;
border:1px solid #00ff00;
min-height:60px;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>Cyber Encoder / Decoder</h1>

<textarea id="input" placeholder="Enter text..."></textarea>

<br>

<button onclick="encode()">Encode</button>
<button onclick="decode()">Decode</button>

<div class="output" id="output"></div>

</div>

<script>

/* Encoder */

function encode(){

let text=document.getElementById("input").value

let encoded=btoa(text)

document.getElementById("output").innerText=encoded

}

/* Decoder */

function decode(){

let text=document.getElementById("input").value

try{
let decoded=atob(text)
document.getElementById("output").innerText=decoded
}
catch{
document.getElementById("output").innerText="Invalid encoded text"
}

}

/* Matrix Background */

const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01"
letters=letters.split("")

let fontSize=14
let columns=canvas.width/fontSize
let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00ff00"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

</script>

</body>
</html>
