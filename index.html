```html
<!DOCTYPE html>
<html>
<head>
<title>Power Web Tools</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.header{
background:#111;
padding:20px;
font-size:28px;
text-align:center;
color:#00ffcc;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:220px;
background:#151515;
padding-top:20px;
}

.sidebar button{
display:block;
width:90%;
margin:10px auto;
padding:12px;
background:#00ffcc;
border:none;
cursor:pointer;
border-radius:6px;
}

.main{
flex:1;
padding:30px;
overflow:auto;
}

.tool{
display:none;
}

input,textarea{
width:300px;
padding:10px;
margin-top:10px;
}

button.action{
margin-top:10px;
padding:10px 20px;
background:#00ffcc;
border:none;
cursor:pointer;
}

#chatBox{
width:100%;
max-width:600px;
height:350px;
background:#111;
border:1px solid #00ffcc;
overflow-y:auto;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.message{
padding:8px 12px;
margin:6px;
border-radius:8px;
max-width:70%;
}

.user{
background:#00ffcc;
color:black;
margin-left:auto;
}

.bot{
background:#333;
color:white;
}

.chatInputArea{
display:flex;
gap:10px;
}

.chatInputArea input{
flex:1;
padding:10px;
}

</style>

</head>

<body>

<div class="header">⚡ Power Web Tools</div>

<div class="container">

<div class="sidebar">

<button onclick="show('password')">Password</button>
<button onclick="show('calc')">Calculator</button>
<button onclick="show('notes')">Notes</button>
<button onclick="show('counter')">Text Counter</button>
<button onclick="show('chat')">AI Chat</button>

</div>

<div class="main">

<div id="password" class="tool">
<h2>Password Generator</h2>
<button class="action" onclick="generate()">Generate</button>
<p id="pass"></p>
</div>

<div id="calc" class="tool">
<h2>Calculator</h2>
<input id="calcInput">
<br>
<button class="action" onclick="calculate()">Calculate</button>
<p id="calcResult"></p>
</div>

<div id="notes" class="tool">
<h2>Notes</h2>
<textarea id="notesText"></textarea>
<br>
<button class="action" onclick="saveNotes()">Save</button>
</div>

<div id="counter" class="tool">
<h2>Text Counter</h2>
<textarea id="text"></textarea>
<br>
<button class="action" onclick="count()">Count</button>
<p id="countResult"></p>
</div>

<div id="chat" class="tool">

<h2>AI Chat</h2>

<div id="chatBox"></div>

<div class="chatInputArea">
<input id="chatInput" placeholder="Type a message..." onkeypress="enterSend(event)">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

</div>

<script>

function show(id){

let tools=document.querySelectorAll(".tool")

tools.forEach(t=>t.style.display="none")

document.getElementById(id).style.display="block"

}

show("password")

function generate(){

let chars="abcdefghijklmnopqrstuvwxyz0123456789"

let pass=""

for(let i=0;i<12;i++){

pass+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("pass").innerText=pass

}

function calculate(){

let v=document.getElementById("calcInput").value

document.getElementById("calcResult").innerText=eval(v)

}

function saveNotes(){

localStorage.setItem("notes",document.getElementById("notesText").value)

alert("Saved")

}

function count(){

let t=document.getElementById("text").value

document.getElementById("countResult").innerText="Characters: "+t.length

}

function sendMessage(){

let input=document.getElementById("chatInput")
let text=input.value.trim()

if(text==="") return

addMessage(text,"user")

let reply=botReply(text)

setTimeout(()=>{
addMessage(reply,"bot")
},500)

input.value=""

}

function addMessage(text,type){

let box=document.getElementById("chatBox")

let msg=document.createElement("div")

msg.classList.add("message",type)

msg.innerText=text

box.appendChild(msg)

box.scrollTop=box.scrollHeight

}

function botReply(input){

input=input.toLowerCase()

if(input.includes("hello")||input.includes("hi"))
return "Hello! 👋"

if(input.includes("who made you"))
return "Ankush made this website."

if(input.includes("help"))
return "Try the tools in the sidebar."

if(input.includes("password"))
return "Use the password generator tool."

return "Interesting question!"

}

function enterSend(e){

if(e.key==="Enter") sendMessage()

}

</script>

</body>
</html>
